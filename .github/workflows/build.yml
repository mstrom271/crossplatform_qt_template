name: Build

on:
  push:

env:
  QT_VERSION: '6.10.2'
  AQT_VERSION: '==3.3.*'
  ANDROID_NDK_VERSION: 'r29'
  ANDROID_API_LEVEL: '35'

jobs:
  build_android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: nttld/setup-ndk@v1.5.0
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          add-to-path: true
          local-cache: true
      - name: Install Qt (Host)
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Qt (android_arm64_v8a)
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Qt (android_x86_64)
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'android'
          arch: 'android_x86_64'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Conan
        id: conan
        uses: turtlebrowser/get-conan@main
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        id: build
        shell: bash
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS: ${{ secrets.ANDROID_KEYALIAS }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
        run: |
          env && echo "-----------------------------"

          set -euo pipefail
          set +x
            umask 077

            KEYSTORE_FILE="$(mktemp /tmp/android_release_XXXXXX.keystore)"
            trap 'rm -f "$KEYSTORE_FILE"' EXIT

            printf '%s' "$ANDROID_KEYSTORE" | base64 --decode > "$KEYSTORE_FILE"
            chmod 600 "$KEYSTORE_FILE"

            export ANDROID_KEYSTORE_FILE="$KEYSTORE_FILE"
          set -x

          ./scripts/build_helper.sh "Release_Android_armv8(Configure,Build,Package)"
          echo "artifact_android_armv8_apk=${ARTIFACT_DIR}/${ARTIFACT_NAME}.apk" >> "$GITHUB_OUTPUT"

          ./scripts/build_helper.sh "Release_Android_x86_64(Configure,Build,Package)"
          echo "artifact_android_x86_64_apk=${ARTIFACT_DIR}/${ARTIFACT_NAME}.apk" >> "$GITHUB_OUTPUT"
      - name: Upload artifact_android_armv8_apk
        uses: actions/upload-artifact@v6
        with:
          name: artifact_android_armv8_apk
          path: ${{ steps.build.outputs.artifact_android_armv8_apk }}
      - name: Upload artifact_android_x86_64_apk
        uses: actions/upload-artifact@v6
        with:
          name: artifact_android_x86_64_apk
          path: ${{ steps.build.outputs.artifact_android_x86_64_apk }}

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Conan
        id: conan
        uses: turtlebrowser/get-conan@main
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        id: build
        shell: bash
        run: |
          env && echo "-----------------------------"

          ./scripts/build_helper.sh "Release_Windows(Configure,Build,Package)"
          echo "artifact_windows_x86_64_tar_bz2=${ARTIFACT_DIR}/${ARTIFACT_NAME}.tar.bz2" >> "$GITHUB_OUTPUT"
      - name: Upload artifact_windows_x86_64_tar_bz2
        uses: actions/upload-artifact@v6
        with:
          name: artifact_windows_x86_64_tar_bz2
          path: ${{ steps.build.outputs.artifact_windows_x86_64_tar_bz2 }}

  build_linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Conan
        id: conan
        uses: turtlebrowser/get-conan@main
      - name: Install LinuxDeploy
        uses: miurahr/install-linuxdeploy-action@v1.8.0
        with:
          plugins: qt appimage
      - name: install dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        id: build
        shell: bash
        run: |
          env && echo "-----------------------------"

          ./scripts/build_helper.sh "Release_Linux(Configure,Build,Package)"
          echo "artifact_linux_x86_64_deb=${ARTIFACT_DIR}/${ARTIFACT_NAME}.deb" >> "$GITHUB_OUTPUT"
          echo "artifact_linux_x86_64_tar_gz=${ARTIFACT_DIR}/${ARTIFACT_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "artifact_linux_x86_64_AppImage=${ARTIFACT_DIR}/${ARTIFACT_NAME}.AppImage" >> "$GITHUB_OUTPUT"
      - name: Upload artifact_linux_x86_64_deb
        uses: actions/upload-artifact@v6
        with:
          name: artifact_linux_x86_64_deb
          path: ${{ steps.build.outputs.artifact_linux_x86_64_deb }}
      - name: Upload artifact_linux_x86_64_tar_gz
        uses: actions/upload-artifact@v6
        with:
          name: artifact_linux_x86_64_tar_gz
          path: ${{ steps.build.outputs.artifact_linux_x86_64_tar_gz }}
      - name: Upload artifact_linux_x86_64_AppImage
        uses: actions/upload-artifact@v6
        with:
          name: artifact_linux_x86_64_AppImage
          path: ${{ steps.build.outputs.artifact_linux_x86_64_AppImage }}

  collect_artifacts:
    needs: [build_android, build_windows, build_linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact_android_armv8_apk
        uses: actions/download-artifact@v7
        with:
          name: artifact_android_armv8_apk
          path: ./artifact
      - name: Download artifact_android_x86_64_apk
        uses: actions/download-artifact@v7
        with:
          name: artifact_android_x86_64_apk
          path: ./artifact
      - name: Download artifact_windows_x86_64_tar_bz2
        uses: actions/download-artifact@v7
        with:
          name: artifact_windows_x86_64_tar_bz2
          path: ./artifact
      - name: Download artifact_linux_x86_64_deb
        uses: actions/download-artifact@v7
        with:
          name: artifact_linux_x86_64_deb
          path: ./artifact
      - name: Download artifact_linux_x86_64_tar_gz
        uses: actions/download-artifact@v7
        with:
          name: artifact_linux_x86_64_tar_gz
          path: ./artifact
      - name: Download artifact_linux_x86_64_AppImage
        uses: actions/download-artifact@v7
        with:
          name: artifact_linux_x86_64_AppImage
          path: ./artifact
      - name: Prepare
        shell: bash
        run: |
          ls -R
      - name: Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          artifacts: "./artifact/*"
          tag: ${{ github.ref_name }}
