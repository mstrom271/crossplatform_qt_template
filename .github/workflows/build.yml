name: Build

on:
  push:

env:
  QT_VERSION: '6.10.2'
  AQT_VERSION: '==3.3.*'
  ANDROID_NDK_VERSION: 'r29'
  ANDROID_API_LEVEL: '35'

jobs:
  build_android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: nttld/setup-ndk@v1.5.0
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          add-to-path: true
          local-cache: true
      - name: Install Qt (Host)
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Qt (android_arm64_v8a)
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Qt (android_x86_64)
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'android'
          arch: 'android_x86_64'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Conan
        id: conan
        uses: turtlebrowser/get-conan@main
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        id: build
        shell: bash
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS: ${{ secrets.ANDROID_KEYALIAS }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
        run: |
          set -euo pipefail
          set +x
            umask 077

            KEYSTORE_FILE="$(mktemp /tmp/android_release_XXXXXX.keystore)"
            trap 'rm -f "$KEYSTORE_FILE"' EXIT

            printf '%s' "$ANDROID_KEYSTORE" | base64 --decode > "$KEYSTORE_FILE"
            chmod 600 "$KEYSTORE_FILE"

            export ANDROID_KEYSTORE_FILE="$KEYSTORE_FILE"
          set -x

          export Qt6_MAIN=${QT_ROOT_DIR}/..
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export ANDROID_NDK=$ANDROID_NDK_LATEST_HOME

          ./scripts/build_helper.sh "Release_Android_armv8(Configure,Build,Package)"
          ./scripts/build_helper.sh "Release_Android_x86_64(Configure,Build,Package)"
      - name: Upload artifact_android
        uses: actions/upload-artifact@v6
        with:
          name: artifact_android
          path: |
            ./build/*/artifact/*.apk
          if-no-files-found: error

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Conan
        id: conan
        uses: turtlebrowser/get-conan@main
      - name: Install NSIS
        shell: bash
        run: |
          choco install nsis -y --no-progress
          echo 'C:\Program Files (x86)\NSIS' >> "$GITHUB_PATH"
          "/c/Program Files (x86)/NSIS/makensis.exe" -VERSION
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        id: build
        shell: bash
        run: |
          export Qt6_MAIN=${QT_ROOT_DIR}/..

          ./scripts/build_helper.sh "Release_Windows(Configure,Build,Package)"
      - name: Upload artifact_windows
        uses: actions/upload-artifact@v6
        with:
          name: artifact_windows
          path: |
            ./build/*/artifact/*.exe
            ./build/*/artifact/*.zip
          if-no-files-found: error

  build_linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.0
        with:
          aqtversion: ${{ env.AQT_VERSION }}
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
      - name: Install Conan
        id: conan
        uses: turtlebrowser/get-conan@main
      - name: Install LinuxDeploy
        uses: miurahr/install-linuxdeploy-action@v1.8.0
        with:
          plugins: qt appimage
      - name: install dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        id: build
        shell: bash
        run: |
          export Qt6_MAIN=${QT_ROOT_DIR}/..

          ./scripts/build_helper.sh "Release_Linux(Configure,Build,Package)"
      - name: Upload artifact_linux
        uses: actions/upload-artifact@v6
        with:
          name: artifact_linux
          path: |
            ./build/*/artifact/*.deb
            ./build/*/artifact/*.tar.gz
            ./build/*/artifact/*.AppImage
          if-no-files-found: error

  collect_artifacts:
    needs: [build_android, build_windows, build_linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact_android
        uses: actions/download-artifact@v7
        with:
          name: artifact_android
          path: ./artifact
      - name: Download artifact_windows
        uses: actions/download-artifact@v7
        with:
          name: artifact_windows
          path: ./artifact
      - name: Download artifact_linux
        uses: actions/download-artifact@v7
        with:
          name: artifact_linux
          path: ./artifact
      - name: Prepare
        shell: bash
        run: |
          ls -R
      - name: Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          artifacts: "./artifact/*"
          tag: ${{ github.ref_name }}
